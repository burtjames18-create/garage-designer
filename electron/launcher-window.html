<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage Living Designer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #111;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .logo-area img {
      width: 180px;
      filter: brightness(1.1);
    }

    .app-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #999;
    }

    .status-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 320px;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      background: #2a2a2a;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c8102e, #e84057);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Indeterminate animation when checking */
    .progress-bar.indeterminate {
      width: 30%;
      animation: indeterminate 1.4s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(433%); }
    }

    .status-text {
      font-size: 12px;
      color: #888;
      letter-spacing: 0.5px;
      text-align: center;
      min-height: 18px;
    }

    .version {
      position: absolute;
      bottom: 14px;
      right: 18px;
      font-size: 10px;
      color: #444;
    }

    /* Fade-in on load */
    body { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo-area">
    <img src="../public/assets/gl-logo.png.webp" alt="Garage Living" draggable="false" />
    <div class="app-title">3D Designer</div>
  </div>

  <div class="status-area">
    <div class="progress-track">
      <div class="progress-bar indeterminate" id="progressBar"></div>
    </div>
    <div class="status-text" id="statusText">Initializing...</div>
  </div>

  <div class="version" id="versionLabel">v—</div>

  <script>
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const versionLabel = document.getElementById('versionLabel');

    // Receive version from main process
    if (window.launcher && window.launcher.getVersion) {
      window.launcher.getVersion().then(v => {
        versionLabel.textContent = 'v' + v;
      });
    }

    // Listen for update status events
    if (window.launcher) {
      window.launcher.onUpdateStatus((data) => {
        statusText.textContent = data.message || '';

        switch (data.status) {
          case 'checking':
            progressBar.className = 'progress-bar indeterminate';
            progressBar.style.width = '';
            break;

          case 'available':
            progressBar.className = 'progress-bar indeterminate';
            progressBar.style.width = '';
            break;

          case 'downloading':
            progressBar.className = 'progress-bar';
            progressBar.style.width = (data.percent || 0) + '%';
            break;

          case 'downloaded':
            progressBar.className = 'progress-bar';
            progressBar.style.width = '100%';
            break;

          case 'up-to-date':
          case 'launching':
            progressBar.className = 'progress-bar';
            progressBar.style.width = '100%';
            break;

          case 'error':
            progressBar.className = 'progress-bar';
            progressBar.style.width = '100%';
            progressBar.style.background = '#555';
            break;
        }
      });
    }
  </script>
</body>
</html>
